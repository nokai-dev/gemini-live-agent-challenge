<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <!-- Background -->
  <rect width="1200" height="800" fill="#1a1a2e"/>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#fff" font-size="28" font-weight="bold" font-family="Arial, sans-serif">VoicePilot Architecture</text>
  
  <!-- Electron App Box -->
  <rect x="50" y="70" width="500" height="350" rx="10" fill="#16213e" stroke="#0f3460" stroke-width="2"/>
  <text x="300" y="100" text-anchor="middle" fill="#e94560" font-size="18" font-weight="bold" font-family="Arial, sans-serif">Electron App (Desktop)</text>
  
  <!-- Main Process -->
  <rect x="70" y="120" width="220" height="280" rx="5" fill="#0f3460"/>
  <text x="180" y="145" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" font-family="Arial, sans-serif">Main Process</text>
  <rect x="85" y="160" width="190" height="50" rx="5" fill="#1a1a2e"/>
  <text x="180" y="185" text-anchor="middle" fill="#fff" font-size="11" font-family="Arial, sans-serif">Window Manager</text>
  <rect x="85" y="220" width="190" height="50" rx="5" fill="#1a1a2e"/>
  <text x="180" y="245" text-anchor="middle" fill="#fff" font-size="11" font-family="Arial, sans-serif">Screen Capture</text>
  <rect x="85" y="280" width="190" height="50" rx="5" fill="#1a1a2e"/>
  <text x="180" y="305" text-anchor="middle" fill="#fff" font-size="11" font-family="Arial, sans-serif">File System</text>
  <rect x="85" y="340" width="190" height="50" rx="5" fill="#1a1a2e"/>
  <text x="180" y="365" text-anchor="middle" fill="#fff" font-size="11" font-family="Arial, sans-serif">Gemini Client</text>
  
  <!-- Renderer Process -->
  <rect x="310" y="120" width="220" height="280" rx="5" fill="#0f3460"/>
  <text x="420" y="145" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" font-family="Arial, sans-serif">Renderer Process</text>
  <rect x="325" y="160" width="190" height="50" rx="5" fill="#1a1a2e"/>
  <text x="420" y="185" text-anchor="middle" fill="#fff" font-size="11" font-family="Arial, sans-serif">Control Panel</text>
  <rect x="325" y="220" width="190" height="50" rx="5" fill="#1a1a2e"/>
  <text x="420" y="245" text-anchor="middle" fill="#fff" font-size="11" font-family="Arial, sans-serif">Preview Window</text>
  <rect x="325" y="280" width="190" height="50" rx="5" fill="#1a1a2e"/>
  <text x="420" y="305" text-anchor="middle" fill="#fff" font-size="11" font-family="Arial, sans-serif">Command Log</text>
  <rect x="325" y="340" width="190" height="50" rx="5" fill="#1a1a2e"/>
  <text x="420" y="365" text-anchor="middle" fill="#fff" font-size="11" font-family="Arial, sans-serif">Status Display</text>
  
  <!-- IPC Arrow -->
  <line x1="290" y1="260" x2="310" y2="260" stroke="#e94560" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="300" y="250" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial, sans-serif">IPC</text>
  
  <!-- Cloud Run Box -->
  <rect x="650" y="70" width="500" height="350" rx="10" fill="#16213e" stroke="#0f3460" stroke-width="2"/>
  <text x="900" y="100" text-anchor="middle" fill="#e94560" font-size="18" font-weight="bold" font-family="Arial, sans-serif">Google Cloud Run</text>
  
  <!-- FastAPI Backend -->
  <rect x="670" y="120" width="460" height="280" rx="5" fill="#0f3460"/>
  <text x="900" y="145" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" font-family="Arial, sans-serif">FastAPI Backend</text>
  
  <rect x="690" y="160" width="200" height="100" rx="5" fill="#1a1a2e"/>
  <text x="790" y="185" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="Arial, sans-serif">WebSocket Handler</text>
  <text x="790" y="210" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial, sans-serif">Audio Stream</text>
  <text x="790" y="228" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial, sans-serif">Video Stream</text>
  <text x="790" y="246" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial, sans-serif">Commands</text>
  
  <rect x="910" y="160" width="200" height="100" rx="5" fill="#1a1a2e"/>
  <text x="1010" y="185" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Code Modifier</text>
  <text x="1010" y="210" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial, sans-serif">Parse Response</text>
  <text x="1010" y="228" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial, sans-serif">Apply Changes</text>
  <text x="1010" y="246" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial, sans-serif">Return Result</text>
  
  <rect x="690" y="280" width="420" height="100" rx="5" fill="#1a1a2e"/>
  <text x="900" y="305" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Health &amp; API Endpoints</text>
  <text x="900" y="330" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial, sans-serif">GET /health | GET /ready | POST /api/modify</text>
  <text x="900" y="350" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial, sans-serif">WS /ws/voice</text>
  
  <!-- Gemini API Box -->
  <rect x="350" y="480" width="500" height="200" rx="10" fill="#16213e" stroke="#0f3460" stroke-width="2"/>
  <text x="600" y="510" text-anchor="middle" fill="#e94560" font-size="18" font-weight="bold" font-family="Arial, sans-serif">Gemini Live API (Google)</text>
  
  <rect x="370" y="530" width="220" height="130" rx="5" fill="#0f3460"/>
  <text x="480" y="555" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Input Processing</text>
  <text x="480" y="580" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial, sans-serif">• Audio Understanding</text>
  <text x="480" y="598" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial, sans-serif">• Visual Analysis</text>
  <text x="480" y="616" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial, sans-serif">• Context Awareness</text>
  <text x="480" y="634" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial, sans-serif">• Intent Recognition</text>
  
  <rect x="610" y="530" width="220" height="130" rx="5" fill="#0f3460"/>
  <text x="720" y="555" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Output Generation</text>
  <text x="720" y="580" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial, sans-serif">• Code Modifications</text>
  <text x="720" y="598" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial, sans-serif">• Component Mapping</text>
  <text x="720" y="616" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial, sans-serif">• Confidence Scores</text>
  <text x="720" y="634" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial, sans-serif">• Explanations</text>
  
  <!-- Connection Arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e94560"/>
    </marker>
  </defs>
  
  <!-- Electron to Cloud Run -->
  <line x1="550" y1="245" x2="650" y2="245" stroke="#e94560" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="600" y="235" text-anchor="middle" fill="#fff" font-size="11" font-family="Arial, sans-serif">WebSocket</text>
  
  <!-- Cloud Run to Gemini -->
  <line x1="900" y1="420" x2="720" y2="480" stroke="#e94560" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="850" y="460" text-anchor="middle" fill="#fff" font-size="11" font-family="Arial, sans-serif">HTTP/WS</text>
  
  <!-- Gemini to Cloud Run (return) -->
  <line x1="480" y1="480" x2="600" y2="420" stroke="#4ade80" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <text x="520" y="460" text-anchor="middle" fill="#4ade80" font-size="10" font-family="Arial, sans-serif">Response</text>
  
  <!-- Cloud Run to Electron (return) -->
  <line x1="650" y1="275" x2="550" y2="275" stroke="#4ade80" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <text x="600" y="295" text-anchor="middle" fill="#4ade80" font-size="10" font-family="Arial, sans-serif">Modifications</text>
  
  <!-- Legend -->
  <rect x="50" y="720" width="1100" height="60" rx="5" fill="#16213e"/>
  <text x="70" y="745" fill="#fff" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Legend:</text>
  <line x1="130" y1="740" x2="180" y2="740" stroke="#e94560" stroke-width="3"/>
  <text x="190" y="745" fill="#aaa" font-size="11" font-family="Arial, sans-serif">Request Flow</text>
  <line x1="280" y1="740" x2="330" y2="740" stroke="#4ade80" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="340" y="745" fill="#aaa" font-size="11" font-family="Arial, sans-serif">Response Flow</text>
  <rect x="450" y="730" width="20" height="20" fill="#0f3460"/>
  <text x="480" y="745" fill="#aaa" font-size="11" font-family="Arial, sans-serif">Service/Module</text>
  <rect x="600" y="730" width="20" height="20" fill="#1a1a2e"/>
  <text x="630" y="745" fill="#aaa" font-size="11" font-family="Arial, sans-serif">Component</text>
  
  <text x="900" y="745" text-anchor="end" fill="#666" font-size="10" font-family="Arial, sans-serif">VoicePilot - Gemini Live API Challenge</text>
</svg>